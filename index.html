<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas da Casa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏠 Tarefas da Casa</h1>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="goTo('calendar', this)">Calendário</button>
  <button class="nav-btn" onclick="goTo('tasks', this)">Tarefas</button>
  <button class="nav-btn" onclick="goTo('people', this)">Pessoas</button>
  <button class="nav-btn" onclick="goTo('stats', this)">Resumo</button>
  <div class="nav-spacer"></div>
  <button class="btn-clear" onclick="clearWeek()">Limpar semana</button>
</div>

<!-- =====================
     PÁGINA: CALENDÁRIO
     ===================== -->
<div id="page-calendar">
  <div class="summary-bar" id="summary-bar"></div>
  <div class="cal-layout">

    <!-- Calendário principal -->
    <div class="cal-main">
      <div class="cal-wrap">
        <div class="cal-header-row">
          <div class="cal-corner"></div>
          <div class="cal-day-head">Seg</div>
          <div class="cal-day-head">Ter</div>
          <div class="cal-day-head">Qua</div>
          <div class="cal-day-head">Qui</div>
          <div class="cal-day-head">Sex</div>
          <div class="cal-day-head">Sáb</div>
          <div class="cal-day-head">Dom</div>
        </div>
        <div class="cal-scroll" id="cal-scroll">
          <div class="cal-body-row">
            <div class="cal-time-col" id="time-col"></div>
            <div id="day-cols" style="display:flex;flex:1;position:relative"></div>
          </div>
        </div>
      </div>
      <div class="people-row" id="people-row"></div>
    </div>

    <!-- Sidebar fixa de tarefas -->
    <div class="cal-sidebar">
      <div class="pool-wrap" style="margin-bottom:0">
        <div class="section-title">Tarefas · duplo clique p/ detalhes</div>
        <div class="pool-tasks pool-tasks-sidebar" id="pool-tasks"></div>
      </div>
    </div>

  </div>
</div>

<!-- =====================
     PÁGINA: TAREFAS
     ===================== -->
<div id="page-tasks" style="display:none">
  <div class="page-header">
    <div class="section-title" style="margin:0">Gerenciar tarefas</div>
    <button class="btn" onclick="openMN()">+ Nova tarefa</button>
  </div>
  <div class="task-cards-grid" id="task-cards-grid"></div>
</div>

<!-- =====================
     PÁGINA: PESSOAS
     ===================== -->
<div id="page-people" style="display:none">
  <div class="page-header">
    <div class="section-title" style="margin:0">Gerenciar pessoas</div>
    <button class="btn" onclick="openMP()">+ Nova pessoa</button>
  </div>
  <div class="people-cards-grid" id="people-cards-grid"></div>
</div>

<!-- =====================
     PÁGINA: RESUMO
     ===================== -->
<div id="page-stats" style="display:none">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="stat-panel">
    <div class="section-title">Distribuição por pessoa</div>
    <div id="stats-bars"></div>
  </div>
  <div class="stat-panel">
    <div class="section-title">Tarefas agendadas</div>
    <div id="stats-tasks"></div>
  </div>
</div>

<!-- MODAL: bloco calendário -->
<div class="modal-bg" id="modal-block-bg">
  <div class="modal">
    <h3 id="mb-title">Configurar tarefa</h3>
    <label>Pessoa responsável</label>
    <select id="mb-person"></select>
    <div class="modal-btns">
      <button class="btn-danger-txt" onclick="removeBlock()">Remover do calendário</button>
      <button class="btn" onclick="closeMB()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMB()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: editar tarefa -->
<div class="modal-bg" id="modal-task-bg">
  <div class="modal">
    <h3 id="mt-title">Editar tarefa</h3>
    <label>Nome</label>
    <input type="text" id="mt-name" placeholder="Nome da tarefa">
    <label>Duração (minutos)</label>
    <input type="number" id="mt-mins" min="5" max="480" step="5">
    <label>Descrição / itens da tarefa</label>
    <textarea id="mt-desc" placeholder="Ex: Lavar louça do almoço, secar e guardar..."></textarea>
    <div class="modal-btns">
      <button class="btn-danger-txt" onclick="deleteTask()">Excluir tarefa</button>
      <button class="btn" onclick="closeMT()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMT()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: nova tarefa -->
<div class="modal-bg" id="modal-new-bg">
  <div class="modal">
    <h3>Nova tarefa</h3>
    <label>Nome</label>
    <input type="text" id="mn-name" placeholder="Ex: Regar plantas">
    <label>Duração (minutos)</label>
    <input type="number" id="mn-mins" value="30" min="5" max="480" step="5">
    <label>Descrição / itens da tarefa</label>
    <textarea id="mn-desc" placeholder="Descreva os passos ou itens desta tarefa..."></textarea>
    <div class="modal-btns">
      <button class="btn" onclick="closeMN()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewTask()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL: detalhes da tarefa (duplo clique) -->
<div class="modal-bg" id="modal-detail-bg">
  <div class="modal">
    <h3 id="dt-title"></h3>
    <div id="dt-body" style="margin-top:6px"></div>
    <div class="modal-btns" style="margin-top:1rem">
      <button class="btn" onclick="closeDetail()">Fechar</button>
      <button class="btn btn-primary" onclick="openEditFromDetail()">Editar tarefa</button>
    </div>
  </div>
</div>

<!-- MODAL: nova/editar pessoa -->
<div class="modal-bg" id="modal-person-bg">
  <div class="modal">
    <h3 id="mp-title">Nova pessoa</h3>
    <label>Nome</label>
    <input type="text" id="mp-name" placeholder="Ex: João">
    <label>Cor</label>
    <div class="color-grid" id="color-grid"></div>
    <div class="modal-btns">
      <button class="btn-danger-txt" id="mp-delete-btn" onclick="deletePerson()" style="display:none">Excluir pessoa</button>
      <button class="btn" onclick="closeMP()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePerson()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: confirmação customizada -->
<div class="modal-bg" id="modal-confirm-bg">
  <div class="modal" style="width:320px">
    <h3 id="confirm-title">Confirmar</h3>
    <p id="confirm-msg" style="font-size:13px;color:#555;margin-top:6px;line-height:1.6"></p>
    <div class="modal-btns" style="margin-top:1.25rem">
      <button class="btn" onclick="confirmCancel()">Cancelar</button>
      <button class="btn" id="confirm-ok-btn" onclick="confirmOk()" style="color:#c0392b;border-color:#f0d0ce">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
